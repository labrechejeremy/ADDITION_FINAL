version: '3.8'

services:
  additiond:
    image: ghcr.io/labrechejeremy/addition_final/additiond:latest
    container_name: additiond
    ports:
      - "8545:8545"
      - "18545:18545"
      - "28545:28545"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  portal-backend:
    build:
      context: ../../
      dockerfile: deploy/github-docker/Dockerfile.backend
    container_name: portal-backend
    ports:
      - "8080:8080"
    environment:
      - ADDITION_RPC_HOST=additiond
      - ADDITION_RPC_PORT=18545
    depends_on:
      - additiond
    restart: unless-stopped
